# Nexus AWS (single-region, multi-AZ HA) — GitLab CI.
#
# One lane (single region). validate runs free on every commit (no creds, no
# cloud). plan/apply use AWS_* creds + the S3 backend; apply is manual (gated).

# hashicorp/terraform image has ENTRYPOINT ["terraform"]; override it so script
# lines run as plain shell.
image:
  name: hashicorp/terraform:1.14
  entrypoint: [""]

stages:
  - validate
  - plan
  - apply

# fmt + validate (free, no creds).
validate:primary:
  stage: validate
  script:
    - terraform -chdir=environments/primary fmt -check -recursive
    - terraform -chdir=environments/primary init -backend=false
    - terraform -chdir=environments/primary validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

plan:primary:
  stage: plan
  variables:
    AWS_ACCESS_KEY_ID: $PRIMARY_AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $PRIMARY_AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION: ap-southeast-5
    TF_VAR_db_master_password: $PRIMARY_DB_PASSWORD
  script:
    - cd environments/primary
    # Only the bucket is injected; the lock table + region are pinned in backend.tf.
    - terraform init -backend-config="bucket=$PRIMARY_STATE_BUCKET"
    - terraform plan -out=primary.tfplan
  artifacts:
    paths:
      - environments/primary/primary.tfplan
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $PRIMARY_STATE_BUCKET'

apply:primary:
  stage: apply
  variables:
    AWS_ACCESS_KEY_ID: $PRIMARY_AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: $PRIMARY_AWS_SECRET_ACCESS_KEY
    AWS_DEFAULT_REGION: ap-southeast-5
    TF_VAR_db_master_password: $PRIMARY_DB_PASSWORD
  script:
    - cd environments/primary
    - terraform init -backend-config="bucket=$PRIMARY_STATE_BUCKET"
    - terraform apply -auto-approve primary.tfplan
  needs:
    - plan:primary
  when: manual # gated
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $PRIMARY_STATE_BUCKET'
